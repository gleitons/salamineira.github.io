    <script>

        const url = ('/falecimentos')
        
        async function btnbb(valor) {
            const resp = await fetch(url);
            const myOb = await resp.json();



            myOb.map((item) => {
                valor++
                document.getElementById('btnge').innerHTML += `<button onclick="cimab(${valor})">Falecido ${valor}</button>`;
            })
        }
        btnbb(0);


        async function cimab(valo) {
            const response = await fetch(url);

            const myObject = await response.json();



            myObject.map((dataResp) => {
                                
                document.getElementById('btnge').innerHTML += gerador(dataResp, valo);
                valo++
                console.log(gerador(dataResp[valo], valo[valo]))
                console.log(valo);

            })
        }



        function gerador(info, numero) {

            const printDiv = document.querySelector('#ajuda');
            var div = document.createElement("div");
            const divM = document.createElement('div')
            var li = document.createElement("li");
            var p = document.createElement("p");
            li.textContent = info.nome;
            p.textContent = (info.falecimento + " - " + numero);
            div.classList.add('nomeL');
            div.appendChild(li);
            div.appendChild(divM)
            divM.appendChild(p);

            printDiv.appendChild(div);

            console.log(div);
        }
