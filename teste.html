<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Array</title>
    <style>
        .nomeL {
            width: 40%;
            border: black solid 1px;
            text-align: center;
        }

        .nomeL>div {
            background-color: rebeccapurple;
            color: white;
            text-align: center;
            padding: .8em;
        }
    </style>
</head>

<body>


    <div class="nomeL">
        <li>MARIA MERCES DOS SANTOS</li>
        <div>
            <p>Caminho das Pedras</p>
        </div>

    </div>
    <button onclick="gerador()">gerar</button>
    <div id="ajuda"></div>
    <div id="impri"></div>

    <script>

        const url = ('/falecimentos')
        async function cimab() {
            response = await fetch(url);
            
            const myObject = await response.json();

            myObject.map((dataResp) => {
                document.querySelector('#impri').innerHTML += `<li>${dataResp.nome}</li>`
                
            })
        }

        console.log(cimab())

        async function gerador() {
            const printDiv = document.querySelector('#ajuda');
            var div = document.createElement("div");
            var h1 = document.createElement("h1");
            var p = document.createElement("p");
            h1.textContent = "Me Ajuda";
            p.textContent = "Preciso adicionar uma classe";
            div.classList.add('nomeL');
            div.appendChild(h1);
            div.appendChild(p);

            printDiv.appendChild(div);
            
            console.log(div);
        }



    </script>
</body>

</html>
